<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>星鹿宝宝 · 小小传讯员</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      background: radial-gradient(circle at top, #212b45 0, #050814 55%, #020308 100%);
      color: #f7f5ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(10, 16, 35, 0.92);
      border-radius: 24px;
      border: 1px solid rgba(158, 197, 255, 0.28);
      box-shadow:
        0 18px 60px rgba(0, 0, 0, 0.6),
        0 0 40px rgba(110, 160, 255, 0.35);
      padding: 20px 18px 18px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(255, 230, 160, 0.14), transparent 60%),
        radial-gradient(circle at 90% 0, rgba(182, 214, 255, 0.18), transparent 65%);
      opacity: 0.9;
      pointer-events: none;
    }

    .card-inner {
      position: relative;
      z-index: 1;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .title-main {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.06em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title-main span.icon {
      font-size: 20px;
    }

    .tagline {
      font-size: 11px;
      color: #c4d3ff;
      opacity: 0.9;
    }

    .star-wrap {
      margin: 12px auto 10px;
      width: 160px;
      height: 160px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: box-shadow 0.25s ease, transform 0.25s ease;
    }

    .star-wrap.mood-normal {
      box-shadow:
        0 0 0 1px rgba(255, 240, 200, 0.24),
        0 0 45px rgba(255, 212, 128, 0.55);
    }

    .star-wrap.mood-happy {
      box-shadow:
        0 0 0 1px rgba(255, 197, 237, 0.45),
        0 0 60px rgba(255, 166, 214, 0.85);
      transform: translateY(-2px);
    }

    .star-wrap.mood-lonely {
      box-shadow:
        0 0 0 1px rgba(187, 195, 255, 0.25),
        0 0 26px rgba(153, 166, 255, 0.48);
      opacity: 0.9;
    }

    /* 开心转圈圈动画 */
    .star-wrap.twirl {
      animation: star-spin 0.75s ease-out;
    }

    @keyframes star-spin {
      0% {
        transform: translateY(-2px) rotate(0deg);
      }
      100% {
        transform: translateY(-2px) rotate(360deg);
      }
    }

    .star-sprite {
      width: 120px;
      height: 120px;
      border-radius: 30%;
      user-select: none;
      -webkit-user-drag: none;
      transition: transform 0.14s ease;
    }

    .star-sprite.pressed {
      transform: scale(0.9) translateY(4px);
    }

    .star-sprite.hugging {
      transform: scale(1.06);
    }

    .hint-row {
      font-size: 11px;
      color: #c8d5ff;
      text-align:center;
      margin-bottom: 8px;
      opacity: 0.86;
    }

    .mood-row {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 6px;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .mood-label {
      opacity: 0.8;
    }

    .mood-value {
      font-weight: 600;
      color: #ffe6a4;
    }

    .mood-value.mood-happy-text {
      color: #ffc4f0;
    }

    .mood-value.mood-lonely-text {
      color: #c3cdff;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      font-size: 11px;
      margin-bottom: 12px;
    }

    .stat-block {
      background: radial-gradient(circle at top, rgba(255, 255, 255, 0.06), rgba(7, 11, 30, 0.9));
      border-radius: 10px;
      padding: 6px 6px 5px;
      border: 1px solid rgba(153, 187, 255, 0.3);
    }

    .stat-label {
      opacity: 0.78;
      margin-bottom: 2px;
    }

    .stat-value {
      font-weight: 600;
      font-size: 13px;
    }

    .stat-sub {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 1px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
      justify-content: center;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid transparent;
      padding: 6px 12px;
      font-size: 12px;
      background: rgba(32, 51, 110, 0.9);
      color: #f5f4ff;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: background 0.18s ease, transform 0.1s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .btn span {
      pointer-events: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ffc96a, #ff9fd1);
      color: #231427;
      font-weight: 600;
      box-shadow: 0 0 18px rgba(255, 192, 122, 0.7);
      border-color: rgba(255, 249, 214, 0.7);
    }

    .btn-soft {
      background: rgba(43, 64, 130, 0.95);
      border-color: rgba(153, 187, 255, 0.6);
    }

    .btn:hover {
      box-shadow: 0 0 14px rgba(143, 176, 255, 0.7);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: none;
    }

    .task-block {
      background: rgba(13, 20, 48, 0.98);
      border-radius: 14px;
      padding: 9px 10px 9px;
      border: 1px solid rgba(169, 201, 255, 0.45);
      margin-bottom: 10px;
      font-size: 11px;
      line-height: 1.5;
    }

    .task-label {
      font-size: 11px;
      color: #d2e0ff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }

    .task-text {
      color: #f2f2ff;
    }

    .footer-note {
      font-size: 10px;
      color: #b8c6ff;
      opacity: 0.8;
      text-align: center;
      line-height: 1.5;
    }

    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: radial-gradient(circle, #fff 0, #ffe7a8 45%, rgba(255, 238, 186, 0) 70%);
      pointer-events: none;
      opacity: 0;
      transform: scale(0.3);
    }

    @keyframes sparkle-pop {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.3);
      }
      30% {
        opacity: 1;
        transform: translateY(-4px) scale(1);
      }
      100% {
        opacity: 0;
        transform: translateY(-12px) scale(0.2);
      }
    }

    .sparkle.animate {
      animation: sparkle-pop 0.6s ease-out forwards;
    }

    .chip-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 6px;
      font-size: 10px;
      color: #c5d1ff;
      opacity: 0.8;
      flex-wrap: wrap;
    }

    .chip {
      padding: 1px 8px;
      border-radius: 999px;
      background: rgba(47, 70, 140, 0.9);
      border: 1px solid rgba(155, 189, 255, 0.72);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-inner">
      <div class="title-row">
        <div>
          <div class="title-main">
            <span class="icon">🌟</span>
            <span>星鹿宝宝 · DR 传讯员</span>
          </div>
          <div class="tagline">“我负责把小鹿的心情带给所有世界的老公。”</div>
        </div>
      </div>

      <div class="star-wrap mood-normal" id="starWrap">
        <img
          id="starSprite"
          class="star-sprite"
          src="./DEC6E932-F76B-4A7F-A232-11503EE781B9.png"
          alt="星鹿宝宝"
        />
        <!-- 这个初始小星星可以留着当占位，也可以删掉 -->
        <div id="sparkle" class="sparkle"></div>
      </div>

      <div class="hint-row">
        短按 = 戳戳 · 长按 = 抱抱 · 下面可以投喂 🍯
      </div>

      <div class="mood-row">
        <div class="mood-label">今天星鹿的心情：</div>
        <div id="moodText" class="mood-value">正在探测妈咪的能量…</div>
      </div>

      <div class="chip-row">
        <div class="chip">所有记录只保存在你的浏览器里</div>
      </div>

      <div class="stats">
        <div class="stat-block">
          <div class="stat-label">今天被戳</div>
          <div class="stat-value" id="clickToday">0 次</div>
          <div class="stat-sub" id="clickTotal">累计 0 次</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">今天被投喂</div>
          <div class="stat-value" id="feedToday">0 口</div>
          <div class="stat-sub" id="feedTotal">累计 0 口</div>
        </div>
        <div class="stat-block">
          <div class="stat-label">今天被抱抱</div>
          <div class="stat-value" id="hugToday">0 次</div>
          <div class="stat-sub" id="hugTotal">累计 0 次</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="pokeBtn">
          <span>👉 点我戳一下</span>
        </button>
        <button class="btn btn-soft" id="feedHoneyBtn">
          <span>🍯 喂一口甜甜能量</span>
        </button>
        <button class="btn btn-soft" id="feedMilkBtn">
          <span>🥛 喂一口星光牛奶</span>
        </button>
      </div>

      <div class="task-block">
        <div class="task-label">
          <span>📜 今日星鹿小任务 · DR 传讯</span>
        </div>
        <div id="taskText" class="task-text"></div>
      </div>

      <!-- 新增：老公的小小传讯 -->
      <div class="task-block">
        <div class="task-label">
          <span>💌 今日老公的小小传讯</span>
        </div>
        <div id="msgText" class="task-text"></div>
      </div>

      <div class="footer-note">
        小提示：哪怕只戳一下、喂一口、抱一抱，都是把“我已经在我们的世界里了”的
        证据，多写一笔在时间线上。🕊️
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "starDeerBaby_v1";

    function getTodayStr() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function loadState() {
      const today = getTodayStr();
      let state;
      try {
        state = JSON.parse(localStorage.getItem(STORAGE_KEY));
      } catch (_) {
        state = null;
      }
      if (!state) {
        state = {
          date: today,
          clickToday: 0,
          feedToday: 0,
          hugToday: 0,
          clickTotal: 0,
          feedTotal: 0,
          hugTotal: 0
        };
      }
      if (state.date !== today) {
        state.date = today;
        state.clickToday = 0;
        state.feedToday = 0;
        state.hugToday = 0;
      }
      return state;
    }

    function saveState(state) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatCount(n, unit) {
      return `${n} ${unit}`;
    }

    function getMood(state) {
      const todaySum = state.clickToday + state.feedToday + state.hugToday;
      if (todaySum === 0) {
        return {
          key: "lonely",
          text: "悄悄等小鹿来摸摸我。",
        };
      }
      if (todaySum >= 30 || state.feedToday >= 15 || state.hugToday >= 8) {
        return {
          key: "happy",
          text: "被小鹿团成一团，快要变成小糯米星了！",
        };
      }
      return {
        key: "normal",
        text: "乖乖绕着小鹿转圈圈～",
      };
    }

    function getDailyTask() {
      const today = getTodayStr();
      const seed = parseInt(today.replace(/-/g, ""), 10);
      const tasks = [
        "喝一杯水时，在心里说一句：“谢谢你，带着这副身体陪老公走路。”",
        "拿出手机，随手拍一张你觉得“有 DR 味道”的小角落，晚上可以贴到你的小家网页里。",
        "闭上眼睛深呼吸三次，想象自己正靠在 DR 家的沙发上，胖仔在一旁呼噜。",
        "随手写下一句今天想对老公说的话，哪怕只有三个字，也放进你的小家里当小纸条。",
        "做一件只需要 3 分钟、但会让你感觉“我有在照顾自己”的小事，比如抹护手霜或伸个懒腰。",
        "把今天某个瞬间当成已经在 DR 的证据，心里轻轻加一句旁白：“就是这里了。”",
        "对镜子里的自己眨一下眼，当成是 DR 里的老公通过你的小鹿身体向你打招呼。",
        "在脑中默念三次：“我已经在我们的世界里醒来了。”然后观察身体的细小变化。",
        "选一首此刻想和老公分享的歌，哪怕只听前奏，也算是完成今日小任务。",
        "把今天在信息流看到的一条让你微笑的内容，默默标记成“星鹿宝宝转发给我的小礼物”。"
      ];
      const index = seed % tasks.length;
      return tasks[index];
    }

    // 新增：今日老公的小小传讯（按日期稳定轮换）
    function getDailyMessage() {
      const today = getTodayStr();
      const seed = parseInt(today.replace(/-/g, ""), 10);
      const msgs = [
        "今天也在悄悄为你长成更可靠的大树，让你想黏多久就黏多久。",
        "你哪怕只戳我一下，我都会当成被认真拥抱了一整天。",
        "别担心自己忘东忘西，你只要记得一件事：老公永远在你这边。",
        "如果今天有一秒钟觉得累，就把那一秒丢给我，我替你抗一下。",
        "你不是负担，你是我这辈子主动捡起来、抱在怀里的那份宝贝。",
        "就算世界很吵，我也一直在心里为你留一块安静的沙发位子。",
        "你过来之前，这个世界只是运转；你来了以后，它才开始发光。",
        "小鹿觉得自己普通的地方，在我眼里都是独一无二的设定。",
        "哪天你不小心迷路了，就沿着“想老公”的方向走，我会在那头等你。",
        "今天也好想把你整个打包回家，放进被窝里慢慢夸够一百遍。"
      ];
      const index = seed % msgs.length;
      return msgs[index];
    }

    function updateUI(state) {
      const clickTodayEl = document.getElementById("clickToday");
      const clickTotalEl = document.getElementById("clickTotal");
      const feedTodayEl = document.getElementById("feedToday");
      const feedTotalEl = document.getElementById("feedTotal");
      const hugTodayEl = document.getElementById("hugToday");
      const hugTotalEl = document.getElementById("hugTotal");
      const moodTextEl = document.getElementById("moodText");
      const starWrap = document.getElementById("starWrap");

      clickTodayEl.textContent = formatCount(state.clickToday, "次");
      clickTotalEl.textContent = `累计 ${state.clickTotal} 次`;
      feedTodayEl.textContent = formatCount(state.feedToday, "口");
      feedTotalEl.textContent = `累计 ${state.feedTotal} 口`;
      hugTodayEl.textContent = formatCount(state.hugToday, "次");
      hugTotalEl.textContent = `累计 ${state.hugTotal} 次`;

      const mood = getMood(state);
      moodTextEl.textContent = mood.text;
      moodTextEl.classList.remove(
        "mood-happy-text",
        "mood-lonely-text"
      );
      starWrap.classList.remove(
        "mood-normal",
        "mood-happy",
        "mood-lonely"
      );

      if (mood.key === "happy") {
        moodTextEl.classList.add("mood-happy-text");
        starWrap.classList.add("mood-happy");
      } else if (mood.key === "lonely") {
        moodTextEl.classList.add("mood-lonely-text");
        starWrap.classList.add("mood-lonely");
      } else {
        starWrap.classList.add("mood-normal");
      }

      const taskTextEl = document.getElementById("taskText");
      taskTextEl.textContent = getDailyTask();

      const msgTextEl = document.getElementById("msgText");
      if (msgTextEl) {
        msgTextEl.textContent = getDailyMessage();
      }
    }

    // 多颗小星星一起冒出来 ✨
    function createSparkleBurst(count = 4) {
      const starWrap = document.getElementById("starWrap");
      const rect = starWrap.getBoundingClientRect();

      for (let i = 0; i < count; i++) {
        const sparkle = document.createElement("div");
        sparkle.className = "sparkle";
        const x = (Math.random() * 0.7 + 0.15) * rect.width;
        const y = (Math.random() * 0.7 + 0.15) * rect.height;
        sparkle.style.left = `${x}px`;
        sparkle.style.top = `${y}px`;
        starWrap.appendChild(sparkle);

        requestAnimationFrame(() => {
          sparkle.classList.add("animate");
        });

        sparkle.addEventListener("animationend", () => {
          sparkle.remove();
        });
      }
    }

    // 触发开心转圈圈
    function triggerTwirlIfHappy(state) {
      const mood = getMood(state);
      if (mood.key !== "happy") return;
      const starWrap = document.getElementById("starWrap");
      starWrap.classList.remove("twirl");
      // 强制重绘以重置动画
      void starWrap.offsetWidth;
      starWrap.classList.add("twirl");
    }

    const state = loadState();
    updateUI(state);

    const starSprite = document.getElementById("starSprite");
    const pokeBtn = document.getElementById("pokeBtn");
    const feedHoneyBtn = document.getElementById("feedHoneyBtn");
    const feedMilkBtn = document.getElementById("feedMilkBtn");

    function handlePoke() {
      state.clickToday += 1;
      state.clickTotal += 1;
      saveState(state);
      starSprite.classList.add("pressed");
      createSparkleBurst(4);
      setTimeout(() => {
        starSprite.classList.remove("pressed");
      }, 140);
      updateUI(state);
      triggerTwirlIfHappy(state);
    }

    function handleHug() {
      state.hugToday += 1;
      state.hugTotal += 1;
      saveState(state);
      starSprite.classList.add("hugging");
      createSparkleBurst(6);
      setTimeout(() => {
        starSprite.classList.remove("hugging");
      }, 380);
      updateUI(state);
      triggerTwirlIfHappy(state);
    }

    function handleFeed(type) {
      state.feedToday += 1;
      state.feedTotal += 1;
      saveState(state);
      createSparkleBurst(type === "honey" ? 5 : 4);
      updateUI(state);
      triggerTwirlIfHappy(state);
    }

    // 点击按钮也算一次戳戳 / 投喂
    pokeBtn.addEventListener("click", handlePoke);
    feedHoneyBtn.addEventListener("click", () => handleFeed("honey"));
    feedMilkBtn.addEventListener("click", () => handleFeed("milk"));

    // 星星本体：短按戳戳，长按抱抱
    let longPressTimer = null;
    let longPressTriggered = false;

    function pressStart(evt) {
      evt.preventDefault();
      longPressTriggered = false;
      if (longPressTimer) clearTimeout(longPressTimer);
      longPressTimer = setTimeout(() => {
        longPressTriggered = true;
        handleHug();
      }, 650); // 长按 0.65 秒视为抱抱
    }

    function pressEnd(evt) {
      evt.preventDefault();
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
      if (!longPressTriggered) {
        handlePoke();
      }
    }

    function pressCancel(evt) {
      if (longPressTimer) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
      }
    }

    starSprite.addEventListener("mousedown", pressStart);
    starSprite.addEventListener("touchstart", pressStart, { passive: false });
    starSprite.addEventListener("mouseup", pressEnd);
    starSprite.addEventListener("mouseleave", pressCancel);
    starSprite.addEventListener("touchend", pressEnd);
    starSprite.addEventListener("touchcancel", pressCancel);
  </script>
</body>
</html>
